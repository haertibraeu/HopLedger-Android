name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Gradle Check
        run: ./gradlew check

      - name: Build debug APK (PRs / manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: ./gradlew assembleDebug

      - name: Build release APK (tags)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="$(pwd)/keystore.jks" \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            echo "No keystore — building debug APK (signed with debug key, installable)"
            ./gradlew assembleDebug
          fi

      - name: Upload debug APK artifact (PRs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: hopledger-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Get tag name
        if: startsWith(github.ref, 'refs/tags/')
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: HopLedger ${{ steps.tag.outputs.TAG }}
          tag_name: ${{ steps.tag.outputs.TAG }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.TAG, '-') }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/**/*.apk
